<!doctype html>
<html>
<head><style>
:root {
  --calico-hit-area-size: 132px;
  --calico-sprite-size: 126px;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  background: transparent;
  overflow: hidden;
}

body {
  position: relative;
  display: grid;
  place-items: center;
}

.calico-entry {
  width: var(--calico-hit-area-size);
  height: var(--calico-hit-area-size);
  padding: 0;
  border: 0;
  background: transparent;
  cursor: grab;
  display: grid;
  place-items: center;
  position: relative;
  -webkit-user-select: none;
  user-select: none;
}

.calico-entry:active {
  cursor: grabbing;
}

.calico-entry:focus-visible {
  outline: 2px solid rgba(74, 144, 217, 0.9);
  outline-offset: -10px;
  border-radius: 20px;
}

.calico-sprite {
  --calico-scale: 1;
  --calico-offset-x: 0px;
  --calico-offset-y: 0px;
  --calico-hover-y: 0px;
  --calico-press-y: 0px;
  --calico-rotate: 0deg;
  position: absolute;
  inset: 50% auto auto 50%;
  width: var(--calico-sprite-size);
  height: var(--calico-sprite-size);
  object-fit: contain;
  pointer-events: none;
  transform-origin: 45% 76%;
  transform:
    translate(
      calc(-50% + var(--calico-offset-x)),
      calc(-50% + var(--calico-offset-y) + var(--calico-hover-y) + var(--calico-press-y))
    )
    rotate(var(--calico-rotate))
    scale(var(--calico-scale));
  transition: transform 140ms ease;
}

.calico-sprite[hidden] {
  display: none;
}

.calico-entry:hover .calico-sprite {
  --calico-hover-y: -2px;
}

.calico-entry.is-pressing .calico-sprite {
  --calico-press-y: 1px;
}

.calico-entry[data-motion-state="react-drag"] .calico-sprite,
.calico-entry.is-dragging .calico-sprite {
  --calico-rotate: -2deg;
}

.calico-entry[data-motion-state="idle-follow"] .calico-sprite,
.calico-entry[data-motion-state="idle"] .calico-sprite {
  animation: calico-idle-breath 1800ms ease-in-out infinite alternate;
}

@keyframes calico-idle-breath {
  from {
    transform:
      translate(
        calc(-50% + var(--calico-offset-x)),
        calc(-50% + var(--calico-offset-y) + var(--calico-hover-y) + var(--calico-press-y))
      )
      rotate(var(--calico-rotate))
      scale(var(--calico-scale));
  }
  to {
    transform:
      translate(
        calc(-50% + var(--calico-offset-x)),
        calc(-50% + var(--calico-offset-y) + var(--calico-hover-y) + var(--calico-press-y) - 1px)
      )
      rotate(var(--calico-rotate))
      scale(var(--calico-scale));
  }
}

.calico-status-bubble {
  position: absolute;
  top: 4px;
  left: 50%;
  z-index: 2;
  max-width: 124px;
  padding: 5px 8px;
  overflow: hidden;
  color: #1f2937;
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid rgba(203, 213, 225, 0.9);
  border-radius: 999px;
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14);
  font: 700 11px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  opacity: 0;
  pointer-events: none;
  text-align: center;
  text-overflow: ellipsis;
  transform: translateX(-50%) translateY(-4px);
  transition:
    opacity 120ms ease,
    transform 120ms ease;
  white-space: nowrap;
}

.calico-status-bubble.is-visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.calico-status-bubble.is-sent {
  color: #166534;
  border-color: rgba(134, 239, 172, 0.9);
}

.calico-status-bubble.is-copied,
.calico-status-bubble.is-failed {
  color: #92400e;
  border-color: rgba(253, 186, 116, 0.9);
}

</style></head>
<body>
<div id="statusBubble" class="calico-status-bubble" aria-live="polite"></div>
<button
  id="btn"
  class="calico-entry"
  title="Open Prompt Picker"
  aria-label="Open Prompt Picker"
  data-motion-state="idle-follow"
>
  <canvas id="calicoCanvas" class="calico-sprite" width="252" height="252" aria-hidden="true"></canvas>
</button>
<script type="module">
const btn = document.getElementById('btn');
const calicoCanvas = document.getElementById('calicoCanvas');
const statusBubble = document.getElementById('statusBubble');
const tauri = window.__TAURI__;
const DRAG_START_DISTANCE_PX = 10;
const CALICO_ASSET_VERSION = '1.0.8-calico-bounded-canvas-v1';
const rendererInstanceId = Number(new URLSearchParams(window.location.search).get('rendererInstanceId'));
let start = null;
let dragging = false;
let lastMove = null;
let animationFrame = 0;
let contextMenuOpened = false;
let pointerSequence = 0;
let promptPickSessionId = 0;
let dragStartedEmitted = false;
let dragPopoverHidden = false;
let motionResetTimer = 0;
let statusTimer = 0;
let lastAccessibilitySettingsOpenAt = 0;
let calicoRenderer = null;
let calicoMotion = null;
let calicoIdleDirector = null;
let createCalicoIdleDirector = null;
let createCalicoMotionRuntime = null;
let createCalicoFrameRenderer = null;
let calicoManifest = null;
let calicoSheetManifest = null;
let rendererTransitionId = 0;
let lifecycleGeneration = 0;
let lifecyclePromise = null;
let fatalRecoveryPromise = null;
let resizePromise = null;
let queuedDpr = null;
let currentDpr = 2;
const permissionMessages = {
  'zh-CN': {
    nativePrompt: '请在系统弹窗中授权',
    nativePromptFallback: '未看到弹窗？再点小猫',
    settingsOpened: '请启用 Prompt Picker',
    settingsOpenFailed: '请手动打开系统设置中的辅助功能权限'
  },
  'en-US': {
    nativePrompt: 'Use the system prompt',
    nativePromptFallback: 'No prompt? Click Calico again',
    settingsOpened: 'Enable Prompt Picker in Accessibility',
    settingsOpenFailed: 'Open Accessibility manually in System Settings'
  }
};

function clearMotionTimers() {
  window.clearTimeout(motionResetTimer);
}

function applyCalicoMotion(payload = {}) {
  return calicoMotion?.apply(payload) ?? false;
}

function resetCalicoMotion() {
  clearMotionTimers();
  calicoMotion?.reset();
}

function versionedCalicoAsset(path) {
  return `${path}?v=${encodeURIComponent(CALICO_ASSET_VERSION)}`;
}

async function loadCalicoModules() {
  if (createCalicoIdleDirector && createCalicoMotionRuntime && createCalicoFrameRenderer) return;
  const [frameRendererModule, idleDirectorModule, motionRuntimeModule] = await Promise.all([
    import(versionedCalicoAsset('/calico/frame-renderer.js')),
    import(versionedCalicoAsset('/calico/idle-director.js')),
    import(versionedCalicoAsset('/calico/motion-runtime.js'))
  ]);
  createCalicoFrameRenderer = frameRendererModule.createCalicoFrameRenderer;
  createCalicoIdleDirector = idleDirectorModule.createCalicoIdleDirector;
  createCalicoMotionRuntime = motionRuntimeModule.createCalicoMotionRuntime;
}

function pauseIdleForExternalMotion(payload = {}) {
  const durationMs = Number.isFinite(payload.durationMs) ? payload.durationMs : 3_600;
  calicoIdleDirector?.resetIdleClock();
  calicoIdleDirector?.pause(durationMs + 1_000);
}

function pauseIdleForPointerInteraction(durationMs = 5_000) {
  calicoIdleDirector?.resetIdleClock();
  calicoIdleDirector?.pause(durationMs);
}

function wait(ms) {
  return new Promise((resolve) => window.setTimeout(resolve, ms));
}

async function reportRendererReady(ready) {
  if (!Number.isSafeInteger(rendererInstanceId) || rendererInstanceId <= 0) {
    throw new Error('Missing Calico renderer instance id');
  }
  rendererTransitionId += 1;
  return invokeOrThrow('set_prompt_button_renderer_ready', {
    rendererInstanceId,
    transitionId: rendererTransitionId,
    ready,
  });
}

function readinessTransitionApplied(outcome) {
  if (!outcome?.accepted) return false;
  if (outcome.action === 'showCurrent' || outcome.action === 'hideCurrent') {
    return outcome.applied === true;
  }
  return true;
}

async function ensureCalicoResources() {
  await loadCalicoModules();
  if (!calicoManifest || !calicoSheetManifest) {
    const [manifestResponse, sheetResponse] = await Promise.all([
      fetch(versionedCalicoAsset('/calico/manifest.json'), { cache: 'no-store' }),
      fetch(versionedCalicoAsset('/calico/sheets/manifest.json'), { cache: 'no-store' }),
    ]);
    if (!manifestResponse.ok || !sheetResponse.ok) {
      throw new Error(`Calico manifest load failed: ${manifestResponse.status}/${sheetResponse.status}`);
    }
    [calicoManifest, calicoSheetManifest] = await Promise.all([
      manifestResponse.json(),
      sheetResponse.json(),
    ]);
  }
}

function buildIdleDirector() {
  if (calicoIdleDirector) return;
  const motionDurations = Object.fromEntries(
    Object.entries(calicoManifest.states).map(([state, entry]) => [state, entry.durationMs])
  );
  calicoIdleDirector = createCalicoIdleDirector({
    applyMotion: applyCalicoMotion,
    resetMotion: resetCalicoMotion,
    getCurrentState: () => btn.dataset.motionState || calicoManifest.defaultState,
    isUserActive: () => Boolean(start || dragging || contextMenuOpened),
    motionDurations,
  });
  calicoIdleDirector.start();
}

async function initializeCalicoMotionOnce() {
  const generation = lifecycleGeneration;
  if (lifecyclePromise?.generation === generation) return lifecyclePromise.promise;
  const promise = (async () => {
    await ensureCalicoResources();
    if (generation !== lifecycleGeneration) return false;
    if (!calicoRenderer) {
      currentDpr = window.devicePixelRatio || 1;
      calicoCanvas.width = Math.max(1, Math.round(126 * currentDpr));
      calicoCanvas.height = Math.max(1, Math.round(126 * currentDpr));
      calicoRenderer = createCalicoFrameRenderer({
        canvas: calicoCanvas,
        assetVersion: CALICO_ASSET_VERSION,
        onError: (error) => console.error('Calico renderer error', error),
        onFatalRender: reportFatalRendererError,
      });
    }
    calicoRenderer.setPresentation(calicoManifest.states["idle-follow"]);
    const baselineReady = await calicoRenderer.showBaseline();
    if (!baselineReady || generation !== lifecycleGeneration) return false;
    if (!calicoMotion) {
      calicoMotion = createCalicoMotionRuntime({
        renderer: calicoRenderer,
        host: btn,
        manifest: calicoManifest,
        sheetManifest: calicoSheetManifest,
      });
      calicoMotion.reset();
      buildIdleDirector();
    }
    const outcome = await reportRendererReady(true);
    return readinessTransitionApplied(outcome) && generation === lifecycleGeneration;
  })();
  lifecyclePromise = { generation, promise };
  try {
    return await promise;
  } finally {
    if (lifecyclePromise?.promise === promise) lifecyclePromise = null;
  }
}

async function initializeCalicoMotion() {
  let lastError = null;
  for (const delay of [0, 100, 400]) {
    if (delay) await wait(delay);
    try {
      if (await initializeCalicoMotionOnce()) return true;
      lastError = new Error('Calico baseline draw was not accepted');
    } catch (error) {
      lastError = error;
    }
  }
  console.error('Failed to initialize Calico motion runtime', lastError);
  await reportRendererReady(false).catch(() => {});
  return false;
}

async function resumeAndReportReady() {
  const generation = lifecycleGeneration;
  if (!calicoMotion || !calicoRenderer) return initializeCalicoMotion();
  if (lifecyclePromise?.generation === generation) return lifecyclePromise.promise;
  const promise = (async () => {
    const state = calicoRenderer.diagnostics().state;
    if (state === 'lost') calicoMotion.suspend({ retainFrame: true });
    const resumed = state === 'ready' || await Promise.resolve(calicoMotion.resume());
    if (!resumed || generation !== lifecycleGeneration) return false;
    const outcome = await reportRendererReady(true);
    if (!readinessTransitionApplied(outcome) || generation !== lifecycleGeneration) return false;
    calicoIdleDirector?.start();
    return true;
  })();
  lifecyclePromise = { generation, promise };
  try {
    return await promise;
  } finally {
    if (lifecyclePromise?.promise === promise) lifecyclePromise = null;
  }
}

async function recoverFatalRenderer(generation) {
  let lastError = null;
  try {
    const hidden = await reportRendererReady(false);
    if (!readinessTransitionApplied(hidden) || generation !== lifecycleGeneration) return false;
  } catch (error) {
    console.error('Failed to hide Calico after renderer error', error);
    return false;
  }

  for (const delay of [0, 100, 400]) {
    if (delay) await wait(delay);
    if (generation !== lifecycleGeneration) return false;
    try {
      if (await resumeAndReportReady()) return true;
      lastError = new Error('Calico renderer redraw was not accepted');
    } catch (error) {
      lastError = error;
    }
  }
  console.error('Failed to recover Calico renderer in place', lastError);
  return false;
}

function reportFatalRendererError(error) {
  console.error('Fatal Calico renderer error', error);
  if (fatalRecoveryPromise) return fatalRecoveryPromise;
  lifecycleGeneration += 1;
  const generation = lifecycleGeneration;
  lifecyclePromise = null;
  calicoIdleDirector?.stop();
  calicoMotion?.suspend({ retainFrame: true });
  const promise = recoverFatalRenderer(generation);
  fatalRecoveryPromise = promise;
  promise.finally(() => {
    if (fatalRecoveryPromise === promise) fatalRecoveryPromise = null;
  });
  return promise;
}

async function resizeCalicoBackingStore(nextDpr) {
  if (!calicoRenderer || !calicoMotion || nextDpr === currentDpr) return;
  if (resizePromise) {
    queuedDpr = nextDpr;
    return resizePromise;
  }
  const generation = lifecycleGeneration;
  resizePromise = (async () => {
    calicoMotion.suspend({ retainFrame: true });
    const token = calicoRenderer.prepareBackingStoreResize(nextDpr);
    if (!token) {
      calicoMotion.resume();
      return;
    }
    const hidden = await reportRendererReady(false);
    if (!readinessTransitionApplied(hidden) || generation !== lifecycleGeneration) {
      calicoMotion.resume();
      return;
    }
    if (!calicoRenderer.commitPreparedResize(token)) {
      reportFatalRendererError(new Error('Calico backing-store resize failed'));
      return;
    }
    currentDpr = nextDpr;
    if (!calicoMotion.resume()) {
      reportFatalRendererError(new Error('Calico renderer failed after resize'));
      return;
    }
    await reportRendererReady(true);
  })();
  try {
    await resizePromise;
  } finally {
    resizePromise = null;
  }
  const latestDpr = queuedDpr;
  queuedDpr = null;
  if (latestDpr && latestDpr !== currentDpr) {
    return resizeCalicoBackingStore(latestDpr);
  }
}

function distance(a, b) {
  return Math.hypot(a.screenX - b.screenX, a.screenY - b.screenY);
}

async function invoke(command, args) {
  if (!tauri?.core?.invoke) {
    console.error("Tauri invoke API is unavailable in overlay.html");
    return null;
  }
  try {
    return await tauri.core.invoke(command, args);
  } catch (error) {
    console.error(`Tauri command failed: ${command}`, error);
    return null;
  }
}

async function invokeOrThrow(command, args) {
  if (!tauri?.core?.invoke) {
    throw new Error("Tauri invoke API is unavailable in overlay.html");
  }
  return tauri.core.invoke(command, args);
}

async function emit(event, payload) {
  if (!tauri?.event?.emit) return;
  try {
    await tauri.event.emit(event, payload);
  } catch (error) {
    console.error(`Tauri event failed: ${event}`, error);
  }
}

async function hidePromptPopoverForDrag() {
  if (dragPopoverHidden) return;
  dragPopoverHidden = true;
  await invoke('hide_prompt_popover');
}

function hideStatusBubble() {
  if (!statusBubble) return;
  statusBubble.classList.remove('is-visible');
}

function showStatusBubble(payload) {
  if (!statusBubble || !payload) return;
  const kind = payload.kind || 'failed';
  const message = payload.message || '未能自动发送';
  window.clearTimeout(statusTimer);
  statusBubble.textContent = message;
  statusBubble.title = '';
  statusBubble.className = `calico-status-bubble is-visible is-${kind}`;
  statusTimer = window.setTimeout(hideStatusBubble, 1800);
}

function permissionText(permission, key) {
  const language = permission?.language === 'en-US' ? 'en-US' : 'zh-CN';
  return permissionMessages[language][key];
}

async function handleMissingPromptInteractionPermission(permission) {
  if (!permission.native_prompt_requested) {
    showStatusBubble({ kind: 'failed', message: permissionText(permission, 'nativePrompt') });
    const status = await invoke('request_prompt_interaction_permission');
    if (status?.trusted) {
      hideStatusBubble();
      return;
    }
    window.clearTimeout(statusTimer);
    statusTimer = window.setTimeout(() => {
      showStatusBubble({ kind: 'failed', message: permissionText(permission, 'nativePromptFallback') });
    }, 1900);
    return;
  }

  const now = Date.now();
  if (now - lastAccessibilitySettingsOpenAt < 4_000) {
    showStatusBubble({ kind: 'failed', message: permissionText(permission, 'settingsOpened') });
    return;
  }

  try {
    await invokeOrThrow('open_accessibility_settings');
    lastAccessibilitySettingsOpenAt = now;
    showStatusBubble({ kind: 'failed', message: permissionText(permission, 'settingsOpened') });
  } catch (error) {
    console.error('Failed to open Accessibility settings', error);
    showStatusBubble({ kind: 'failed', message: permissionText(permission, 'settingsOpenFailed') });
  }
}

function listenForAutosendStatus() {
  if (!tauri?.event?.listen) return;
  tauri.event.listen('prompt-autosend-status', (event) => {
    showStatusBubble(event.payload);
  }).catch((error) => {
    console.error('Tauri event listen failed: prompt-autosend-status', error);
  });
}

function listenForCalicoMotion() {
  if (!tauri?.event?.listen) return;
  tauri.event.listen('calico-motion', (event) => {
    pauseIdleForExternalMotion(event.payload);
    applyCalicoMotion(event.payload);
  }).catch((error) => {
    console.error('Tauri event listen failed: calico-motion', error);
  });
}

function listenForPromptPopoverDismissed() {
  if (!tauri?.event?.listen) return;
  tauri.event.listen('prompt-popover-dismissed', () => {
    if (calicoIdleDirector) {
      calicoIdleDirector.resetToBaseline();
    } else {
      resetCalicoMotion();
    }
  }).catch((error) => {
    console.error('Tauri event listen failed: prompt-popover-dismissed', error);
  });
}

async function openButtonControls(event) {
  event.preventDefault();
  contextMenuOpened = true;
  start = null;
  dragging = false;
  lastMove = null;
  btn.classList.remove('is-pressing', 'is-dragging');
  resetCalicoMotion();
  pauseIdleForPointerInteraction(6_000);
  await invoke('show_prompt_button_controls_from_button');
}

async function flushMove() {
  animationFrame = 0;
  if (!lastMove || !start || !start.positionReady) return;
  await invoke('move_prompt_button_to', {
    x: start.windowX + lastMove.screenX - start.screenX,
    y: start.windowY + lastMove.screenY - start.screenY
  });
}

function handleCalicoPointerEnter() {
  calicoIdleDirector?.handleAttention();
}

btn.addEventListener('pointerdown', (event) => {
  if (event.button === 2 || (event.button === 0 && event.ctrlKey)) {
    openButtonControls(event);
    return;
  }

  pauseIdleForPointerInteraction(5_000);
  const sequence = ++pointerSequence;
  start = {
    screenX: event.screenX,
    screenY: event.screenY,
    windowX: 0,
    windowY: 0,
    positionReady: false,
    pointerId: event.pointerId,
    sequence,
    positionPromise: null
  };
  dragging = false;
  lastMove = null;
  contextMenuOpened = false;
  dragStartedEmitted = false;
  dragPopoverHidden = false;
  btn.classList.add('is-pressing');
  try {
    btn.setPointerCapture(event.pointerId);
  } catch {}

  start.positionPromise = invoke('prompt_button_position_cmd');
  start.positionPromise.then((position) => {
    if (!position || !start || start.sequence !== sequence) return;
    start.windowX = position.x;
    start.windowY = position.y;
    start.positionReady = true;
    if (dragging && lastMove && !animationFrame) {
      animationFrame = requestAnimationFrame(flushMove);
    }
  }).catch(() => {
    if (start?.sequence === sequence) start.positionReady = false;
  });
});

btn.addEventListener('pointermove', (event) => {
  if (!start) return;
  const current = { screenX: event.screenX, screenY: event.screenY };
  if (!dragging && distance(start, current) < DRAG_START_DISTANCE_PX) return;
  if (!dragStartedEmitted) {
    dragStartedEmitted = true;
    calicoIdleDirector?.pause(4000);
    hidePromptPopoverForDrag().catch(() => {});
    emit('prompt-button-drag-started').catch(() => {});
  }
  dragging = true;
  btn.classList.remove('is-pressing');
  btn.classList.add('is-dragging');
  calicoIdleDirector?.pause(4_000);
  if (btn.dataset.motionState !== 'react-drag') {
    applyCalicoMotion({ state: 'react-drag', reason: 'drag' });
  }
  lastMove = current;
  if (!animationFrame) {
    animationFrame = requestAnimationFrame(flushMove);
  }
});

btn.addEventListener('pointerup', async (event) => {
  if (contextMenuOpened) {
    contextMenuOpened = false;
    start = null;
    dragging = false;
    lastMove = null;
    btn.classList.remove('is-pressing', 'is-dragging');
    calicoIdleDirector?.resetIdleClock();
    resetCalicoMotion();
    return;
  }
  if (!start) return;
  const wasDragging = dragging;
  try {
    btn.releasePointerCapture(event.pointerId);
  } catch {}
  if (wasDragging) {
    if (!start.positionReady && start.positionPromise) {
      await start.positionPromise.catch(() => null);
    }
    await flushMove();
    const position = await invoke('prompt_button_position_cmd');
    if (position) {
      await emit('prompt-button-drag-ended', position);
    }
  } else {
    pauseIdleForPointerInteraction(6_000);
    const permission = await invoke('prompt_interaction_permission_status');
    if (permission?.required && !permission.trusted) {
      await handleMissingPromptInteractionPermission(permission);
      resetCalicoMotion();
    } else {
      const sessionId = ++promptPickSessionId;
      await invoke('begin_prompt_pick_session', { sessionId });
      const toggleResult = await invoke('toggle_prompt_popover_from_button', { sessionId });
      if (!toggleResult?.opened) {
        resetCalicoMotion();
      }
    }
  }
  start = null;
  dragging = false;
  lastMove = null;
  dragStartedEmitted = false;
  btn.classList.remove('is-pressing', 'is-dragging');
  calicoIdleDirector?.resetIdleClock();
  if (wasDragging) {
    if (calicoIdleDirector) {
      calicoIdleDirector.resetToBaseline();
    } else {
      resetCalicoMotion();
    }
  }
});

btn.addEventListener('pointerenter', handleCalicoPointerEnter);

btn.addEventListener('contextmenu', async (event) => {
  await openButtonControls(event);
});

window.addEventListener('pagehide', () => {
  lifecycleGeneration += 1;
  lifecyclePromise = null;
  reportRendererReady(false).catch(() => {});
  calicoIdleDirector?.stop();
  calicoMotion?.suspend({ retainFrame: true });
});

window.addEventListener('pageshow', () => {
  resumeAndReportReady()
    .then(() => resizeCalicoBackingStore(window.devicePixelRatio || 1))
    .catch(reportFatalRendererError);
});

calicoCanvas.addEventListener('contextlost', (event) => {
  event.preventDefault?.();
});

calicoCanvas.addEventListener('contextrestored', () => {
  resumeAndReportReady().catch(reportFatalRendererError);
});

window.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    resumeAndReportReady().catch(reportFatalRendererError);
  }
});

window.addEventListener('unload', () => {
  calicoIdleDirector?.stop();
  calicoMotion?.dispose();
});

if (tauri?.event?.listen) {
  tauri.event.listen('prompt-button-renderer-resume-requested', () => {
    resumeAndReportReady().catch(reportFatalRendererError);
  }).catch((error) => console.error('Failed to listen for renderer resume', error));
  tauri.event.listen('tauri://scale-change', (event) => {
    const nextDpr = Number(event.payload?.scaleFactor) || window.devicePixelRatio || 1;
    resizeCalicoBackingStore(nextDpr).catch(reportFatalRendererError);
  }).catch((error) => console.error('Failed to listen for scale changes', error));
}

initializeCalicoMotion()
  .then(() => resizeCalicoBackingStore(window.devicePixelRatio || 1))
  .catch(reportFatalRendererError);
listenForAutosendStatus();
listenForCalicoMotion();
listenForPromptPopoverDismissed();
</script>
