<!doctype html>
<html>
<head><style>
body { margin: 0; background: transparent; }
button { display: flex; align-items: center; gap: 6px; width: 112px; height: 40px; background: #4a90d9; border: none; border-radius: 8px; cursor: pointer; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; padding: 0 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
button:hover { background: #3a7fc8; }
button:active { background: #2d6ab0; }
.icon { font-size: 16px; font-weight: 700; }
</style></head>
<body>
<button id="btn" title="Open Prompt Picker" aria-label="Open Prompt Picker">
  <span class="icon">P</span><span>Prompts</span>
</button>
<script type="module">
const btn = document.getElementById('btn');
const tauri = window.__TAURI__;
let start = null;
let dragging = false;
let lastMove = null;
let animationFrame = 0;
let contextMenuOpened = false;
let pointerSequence = 0;

function distance(a, b) {
  return Math.hypot(a.screenX - b.screenX, a.screenY - b.screenY);
}

async function openButtonControls(event) {
  event.preventDefault();
  contextMenuOpened = true;
  start = null;
  dragging = false;
  lastMove = null;
  if (!tauri?.core?.invoke) return;
  await tauri.core.invoke('show_prompt_button_controls_from_button');
}

async function flushMove() {
  animationFrame = 0;
  if (!lastMove || !start || !start.positionReady) return;
  await tauri.core.invoke('move_prompt_button_to', {
    x: start.windowX + lastMove.screenX - start.screenX,
    y: start.windowY + lastMove.screenY - start.screenY
  });
}

btn.addEventListener('pointerdown', (event) => {
  if (event.button === 2 || (event.button === 0 && event.ctrlKey)) {
    openButtonControls(event);
    return;
  }

  const sequence = ++pointerSequence;
  start = {
    screenX: event.screenX,
    screenY: event.screenY,
    windowX: 0,
    windowY: 0,
    positionReady: false,
    pointerId: event.pointerId,
    sequence,
    positionPromise: null
  };
  dragging = false;
  lastMove = null;
  contextMenuOpened = false;
  try {
    btn.setPointerCapture(event.pointerId);
  } catch {}

  start.positionPromise = tauri.core.invoke('prompt_button_position_cmd');
  start.positionPromise.then((position) => {
    if (!position || !start || start.sequence !== sequence) return;
    start.windowX = position.x;
    start.windowY = position.y;
    start.positionReady = true;
    if (dragging && lastMove && !animationFrame) {
      animationFrame = requestAnimationFrame(flushMove);
    }
  }).catch(() => {
    if (start?.sequence === sequence) {
      start = null;
    }
  });
});

btn.addEventListener('pointermove', (event) => {
  if (!start) return;
  const current = { screenX: event.screenX, screenY: event.screenY };
  if (!dragging && distance(start, current) < 4) return;
  dragging = true;
  lastMove = current;
  if (!animationFrame) {
    animationFrame = requestAnimationFrame(flushMove);
  }
});

btn.addEventListener('pointerup', async (event) => {
  if (contextMenuOpened) {
    contextMenuOpened = false;
    start = null;
    dragging = false;
    lastMove = null;
    return;
  }
  if (!start) return;
  try {
    btn.releasePointerCapture(event.pointerId);
  } catch {}
  if (dragging) {
    if (!start.positionReady && start.positionPromise) {
      await start.positionPromise.catch(() => null);
    }
    await flushMove();
    const position = await tauri.core.invoke('prompt_button_position_cmd');
    if (tauri.event?.emit && position) {
      await tauri.event.emit('prompt-button-drag-ended', position);
    }
  } else {
    await tauri.core.invoke('show_prompt_popover_from_button');
  }
  start = null;
  dragging = false;
  lastMove = null;
});

btn.addEventListener('contextmenu', async (event) => {
  await openButtonControls(event);
});
</script>
</body>
</html>
