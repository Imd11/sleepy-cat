name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Probe Calico WebView renderer
        run: npm run test:calico-webview

      - name: Upload Calico WebView probe diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calico-webview-probe-windows
          path: src-tauri/target/calico-probe-artifacts/
          if-no-files-found: warn

      - name: Build Windows installer
        run: npm run tauri -- build --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: sleepy-cat-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
