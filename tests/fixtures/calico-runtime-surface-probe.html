<!doctype html>
<html>
<head><meta charset="UTF-8"><title>Calico Surface Probe</title></head>
<body>
<canvas id="surface" width="2" height="2"></canvas>
<script>
(async function () {
  var report = {
    createImageBitmapAvailable: typeof window.createImageBitmap === "function",
    imageBitmapCloseAvailable: false,
    preferredBackendDrawn: false,
    compatibilityBackendDrawn: false,
    transparentPixelPreserved: false,
    opaquePixelPreserved: false,
    objectUrlRevoked: false,
    rendererDiagnostics: null,
    error: null
  };

  function inspectPixels(context) {
    var opaque = context.getImageData(0, 0, 1, 1).data;
    var transparent = context.getImageData(1, 1, 1, 1).data;
    report.opaquePixelPreserved = opaque[0] === 255 && opaque[3] === 255;
    report.transparentPixelPreserved = transparent[3] === 0;
  }

  try {
    var response = await fetch("/calico/runtime-probe-a.png", { cache: "no-store" });
    if (!response.ok) throw new Error("App-protocol PNG fetch failed: " + response.status);
    var blob = await response.blob();
    var canvas = document.getElementById("surface");
    var context = canvas.getContext("2d", { alpha: true });
    if (!context) throw new Error("2D canvas context unavailable");

    if (report.createImageBitmapAvailable) {
      var bitmap = await window.createImageBitmap(blob);
      report.imageBitmapCloseAvailable = typeof bitmap.close === "function";
      context.clearRect(0, 0, 2, 2);
      context.drawImage(bitmap, 0, 0);
      report.preferredBackendDrawn = true;
      if (report.imageBitmapCloseAvailable) bitmap.close();
    }

    var objectUrl = URL.createObjectURL(blob);
    var image = new Image();
    try {
      image.src = objectUrl;
      if (typeof image.decode === "function") {
        await image.decode();
      } else {
        await new Promise(function (resolve, reject) {
          image.onload = resolve;
          image.onerror = function () { reject(new Error("Image load failed")); };
        });
      }
      context.clearRect(0, 0, 2, 2);
      context.drawImage(image, 0, 0);
      report.compatibilityBackendDrawn = true;
      inspectPixels(context);
    } finally {
      image.src = "";
      URL.revokeObjectURL(objectUrl);
      report.objectUrlRevoked = true;
    }

    var rendererModule = await import("/calico/frame-renderer.js?v=surface-probe-v1");
    var renderer = rendererModule.createCalicoFrameRenderer({
      canvas: canvas,
      maxDecodedSheets: 2,
      assetVersion: "surface-probe-v1"
    });
    var maxima = {
      decodedSheetCount: 0,
      liveSurfaceCount: 0,
      pendingDecodeCount: 0,
      queuedRequestCount: 0,
      activeTimerCount: 0
    };
    function sampleRenderer() {
      var diagnostics = renderer.diagnostics();
      Object.keys(maxima).forEach(function (key) {
        maxima[key] = Math.max(maxima[key], diagnostics[key]);
      });
      return diagnostics;
    }
    var probeSheets = ["a", "b", "c"].map(function (name) {
      return {
        file: "/calico/runtime-probe-" + name + ".png",
        pixelFormat: "rgba",
        frameWidth: 2,
        frameHeight: 2,
        frameCount: 1,
        columns: 1,
        rows: 1,
        gutter: 0,
        strideX: 2,
        strideY: 2,
        sheetWidth: 2,
        sheetHeight: 2,
        frameDurationsMs: [40],
        plays: 0
      };
    });
    for (var requestIndex = 0; requestIndex < 600; requestIndex += 1) {
      void renderer.play("probe-" + requestIndex, probeSheets[requestIndex % 3], { restart: true });
      sampleRenderer();
    }
    var settleDeadline = Date.now() + 5000;
    var beforeDispose = sampleRenderer();
    while (Date.now() < settleDeadline) {
      await new Promise(function (resolve) { setTimeout(resolve, 20); });
      beforeDispose = sampleRenderer();
      if (beforeDispose.pendingDecodeCount === 0
          && beforeDispose.queuedRequestCount === 0
          && beforeDispose.visualReady) break;
    }
    if (!beforeDispose.visualReady) throw new Error("Production renderer stress did not draw");
    renderer.dispose();
    report.rendererDiagnostics = {
      maxima: maxima,
      beforeDispose: beforeDispose,
      afterDispose: renderer.diagnostics()
    };
  } catch (error) {
    report.error = error instanceof Error ? error.message : String(error);
  }

  try {
    await window.__TAURI__.core.invoke("record_calico_surface_probe", { report: report });
  } catch (error) {
    document.body.textContent = error instanceof Error ? error.message : String(error);
  }
}());
</script>
</body>
</html>
